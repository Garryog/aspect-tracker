<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>Kitchen Install Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;font-family:'DM Sans',sans-serif;color:#0f172a;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;color:inherit}
input:focus,select:focus,textarea:focus{border-color:#3b82f6 !important;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#e2e8f0}::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
details>summary{list-style:none;cursor:pointer}
details>summary::-webkit-details-marker{display:none}
.hcard{transition:all .2s ease;box-shadow:0 1px 3px rgba(15,23,42,.06)}
@media(hover:hover){.hcard:hover{box-shadow:0 8px 24px rgba(15,23,42,.12);transform:translateY(-2px);border-color:#cbd5e1 !important}}
.btn{transition:all .15s}
.btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div id="root" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;color:#64748b">
  <div style="font-size:40px">🏗</div>
  <div style="font-size:14px;font-family:sans-serif">Loading tracker…</div>
</div>
<script>
(function(){
  var m={name:"Kitchen Install Tracker",short_name:"Install Tracker",start_url:"./",display:"standalone",
    background_color:"#f1f5f9",theme_color:"#3b82f6",
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%233b82f6'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E%F0%9F%8F%97%3C/text%3E%3C/svg%3E",sizes:"any",type:"image/svg+xml"}]};
  var b=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  var l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);
  document.head.appendChild(l);
})();
</script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef}=React;

// ── Constants ──────────────────────────────────────────────────────────────────
const STAGES=["Not Started","Site Ready","Delivered","Installed","Installed with Snags","Finished"];
const ROOMS=["Kitchen","Wardrobe","Utility"];
const SNAG_TYPES=[
  {code:"SNAG_BSAW",  label:"Band Saw Issue",           panel:true,  excess:false},
  {code:"SNAG_CNC",   label:"CNC Issue",                panel:true,  excess:false},
  {code:"SNAG_COMP",  label:"Component Issue",          panel:false, excess:false},
  {code:"MISSING",    label:"Missing from Delivery",    panel:false, excess:false},
  {code:"WRONG_HOUSE",label:"Wrong House Delivery",     panel:false, excess:false},
  {code:"EXCESS_MAT", label:"Excess Material Delivered",panel:false, excess:true},
];
const MATS=["Bardolino L1LE","Bardolino L4E","Taupe Grey PM MFC L1LE","Taupe Grey PM MFC L4E","Cashmere PM MFC L1LE","Cashmere PM MFC L4E","MDF Raw"];
const UNITS=["sheets","pieces","packs","boards","doors","panels","other"];
const SC={"Not Started":"#94a3b8","Site Ready":"#10b981","Delivered":"#06b6d4","Installed":"#3b82f6","Installed with Snags":"#f59e0b","Finished":"#16a34a"};
const TC={SNAG_BSAW:"#f59e0b",SNAG_CNC:"#8b5cf6",SNAG_COMP:"#3b82f6",MISSING:"#ef4444",WRONG_HOUSE:"#ec4899",EXCESS_MAT:"#f97316"};
const XLSX_HEADERS=["Qty","Plot","Hs.  Num.","Product","Name","Description","Price",
  "CHILDREN 1 QTY","CHILDREN 1 PRODUCT","CHILDREN 1 NAME","CHILDREN 1 DESCRIPTION","CHILDREN 1 PRICE",
  "CHILDREN 2 QTY","CHILDREN 2 PRODUCT","CHILDREN 2 NAME","CHILDREN 2 DESCRIPTION","CHILDREN 2 PRICE",
  "CHILDREN 3 QTY","CHILDREN 3 PRODUCT","CHILDREN 3 NAME","CHILDREN 3 DESCRIPTION","CHILDREN 3 PRICE",
  "CHILDREN 4 QTY","CHILDREN 4 PRODUCT","CHILDREN 4 NAME","CHILDREN 4 DESCRIPTION","CHILDREN 4 PRICE"];

const T={bg:"#f1f5f9",card:"#ffffff",cardAlt:"#f8fafc",border:"#e2e8f0",borderStrong:"#cbd5e1",
  text:"#0f172a",text2:"#475569",text3:"#94a3b8",text4:"#cbd5e1",
  primary:"#3b82f6",danger:"#ef4444",success:"#16a34a"};

// ── Helpers ────────────────────────────────────────────────────────────────────
const fmtDate=iso=>iso?new Date(iso).toLocaleString("en-IE",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
const fmtShort=iso=>iso?new Date(iso).toLocaleDateString("en-IE",{day:"2-digit",month:"short",year:"numeric"}):"—";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const DR=()=>({installStage:"Not Started",lastInspection:null,finishPhotoKey:null,notes:"",snags:[]});
const DH=name=>({id:uid(),name,createdAt:new Date().toISOString(),rooms:{Kitchen:DR(),Wardrobe:DR(),Utility:DR()}});
const sIdx=v=>STAGES.indexOf(v);
const pct=h=>{const t=ROOMS.length*(STAGES.length-1);return Math.round(ROOMS.reduce((s,r)=>s+sIdx(h.rooms[r].installStage),0)/t*100);};
const totalOpen=h=>ROOMS.reduce((n,r)=>n+h.rooms[r].snags.filter(s=>!s.resolved).length,0);
const rOpen=r=>r.snags.filter(s=>!s.resolved).length;
const pColor=p=>p===100?T.success:p>60?T.primary:p>20?"#f59e0b":T.text3;
const sortHouses=hs=>[...hs].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true,sensitivity:'base'}));

// ── Storage ────────────────────────────────────────────────────────────────────
const LS={
  get:k=>{try{return localStorage.getItem(k);}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);return true;}catch(e){alert("Storage full — try exporting a backup and clearing old photos.");return false;}},
  del:k=>{try{localStorage.removeItem(k);}catch{}},
  keys:()=>{try{return Object.keys(localStorage);}catch{return [];}}
};
const loadH=()=>{try{const d=LS.get("tk4-h");return d?JSON.parse(d):[];}catch{return [];}};
const loadS=()=>{try{const d=LS.get("tk4-s");return d?JSON.parse(d):{project:"Athenry"};}catch{return {project:"Athenry"};}};

// ── Photo ──────────────────────────────────────────────────────────────────────
const compress=(dataUrl,max=1000,q=0.72)=>new Promise(res=>{
  const img=new Image();
  img.onload=()=>{
    const sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas');c.width=~~(img.width*sc);c.height=~~(img.height*sc);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    res(c.toDataURL('image/jpeg',q));
  };img.src=dataUrl;
});
const saveP=async(k,d)=>{const c=await compress(d);return LS.set(k,c);};
const getP=k=>k?LS.get(k):null;
const delP=k=>k&&LS.del(k);

// ── JSON Backup / Restore ──────────────────────────────────────────────────────
const exportBackup=(houses,settings)=>{
  const sortedHouses=sortHouses(houses);
  const photos={};
  sortedHouses.forEach(h=>ROOMS.forEach(r=>{
    const rm=h.rooms[r];
    if(rm.finishPhotoKey){const p=getP(rm.finishPhotoKey);if(p)photos[rm.finishPhotoKey]=p;}
    rm.snags.forEach(s=>{if(s.photoKey){const p=getP(s.photoKey);if(p)photos[s.photoKey]=p;}});
  }));
  const data={version:1,exportedAt:new Date().toISOString(),settings,houses:sortedHouses,photos};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};

const importBackup=(file,setHouses,setSettings)=>{
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!Array.isArray(data.houses)){alert("Invalid backup file.");return;}
      const photoCount=Object.keys(data.photos||{}).length;
      if(!confirm(`Import ${data.houses.length} house(s) and ${photoCount} photo(s)?\n\nThis will REPLACE all current data on this device.`))return;
      if(data.photos)Object.entries(data.photos).forEach(([k,v])=>LS.set(k,v));
      setHouses(data.houses);
      if(data.settings)setSettings(data.settings);
      alert(`Imported ${data.houses.length} house(s) and ${photoCount} photo(s) successfully.`);
    }catch(err){alert("Could not read backup file: "+err.message);}
  };
  reader.readAsText(file);
};

// ── XLSX Exports ───────────────────────────────────────────────────────────────
const exportSnags=(houses,project)=>{
  const empty=Array(20).fill("");
  const rows=[XLSX_HEADERS];
  let found=false;
  houses.forEach(h=>ROOMS.forEach(room=>h.rooms[room].snags.filter(s=>!s.resolved).forEach(s=>{
    found=true;
    let qty=1,name="",desc="";
    if(s.type==="SNAG_BSAW"||s.type==="SNAG_CNC"){
      name=s.description||"";
      desc=[s.material||"",s.height?`H:${s.height}`:"",s.width?`W:${s.width}`:""].filter(Boolean).join(" + ");
    } else if(s.type==="WRONG_HOUSE"){
      name=s.description||"Wrong house delivery";
      desc=`Correct house: ${s.correctHouse||"unknown"}`;
    } else if(s.type==="EXCESS_MAT"){
      qty=parseInt(s.quantity)||1;
      name=s.description||"Excess material delivered";
      desc=[s.material||"",s.quantity?`Qty:${s.quantity} ${s.unit||""}`:""].filter(Boolean).join(" + ");
    } else {
      name=s.description||"";desc="";
    }
    rows.push([qty,project||"Athenry",h.name,s.type,name,desc,"",...empty]);
  })));
  if(!found){alert("No open snags to export.");return;}
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:5},{wch:12},{wch:12},{wch:14},{wch:30},{wch:40},{wch:8},...Array(20).fill({wch:15})];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Open Snags");
  XLSX.writeFile(wb,`Open_Snags_${new Date().toISOString().slice(0,10)}.xlsx`);
};

const exportStatus=houses=>{
  const rows=[["House","Kitchen Stage","Kitchen Snags","Kitchen Notes","Wardrobe Stage","Wardrobe Snags","Wardrobe Notes","Utility Stage","Utility Snags","Utility Notes","Overall %","Kitchen Inspected","Wardrobe Inspected","Utility Inspected"]];
  houses.forEach(h=>rows.push([h.name,
    h.rooms.Kitchen.installStage,rOpen(h.rooms.Kitchen),h.rooms.Kitchen.notes||"",
    h.rooms.Wardrobe.installStage,rOpen(h.rooms.Wardrobe),h.rooms.Wardrobe.notes||"",
    h.rooms.Utility.installStage,rOpen(h.rooms.Utility),h.rooms.Utility.notes||"",
    pct(h)+"%",
    fmtShort(h.rooms.Kitchen.lastInspection),
    fmtShort(h.rooms.Wardrobe.lastInspection),
    fmtShort(h.rooms.Utility.lastInspection)
  ]));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=rows[0].map(hd=>({wch:hd.includes("Notes")?42:hd.includes("Inspected")?20:18}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Status Report");
  XLSX.writeFile(wb,`Status_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
};

// ── PDF Report of Open Snags ───────────────────────────────────────────────────
const exportPDF=async(houses,project)=>{
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const pageW=210,pageH=297,M=15;
  let y=M;

  doc.setFontSize(20).setFont(undefined,'bold');
  doc.text('Open Snags Report',M,y);y+=8;
  doc.setFontSize(11).setFont(undefined,'normal').setTextColor(100,100,100);
  doc.text(`Project: ${project||"Athenry"}`,M,y);y+=5;
  doc.text(`Generated: ${new Date().toLocaleString('en-IE')}`,M,y);y+=8;

  let totalOpen=0;
  houses.forEach(h=>ROOMS.forEach(r=>totalOpen+=h.rooms[r].snags.filter(s=>!s.resolved).length));
  if(totalOpen===0){alert("No open snags to export.");return;}

  doc.setFontSize(10).setTextColor(60,60,60);
  doc.text(`Total open snags: ${totalOpen}`,M,y);y+=10;

  const ensureSpace=(needed)=>{if(y+needed>pageH-M){doc.addPage();y=M;}};

  for(const h of houses){
    const hsnags=[];
    ROOMS.forEach(r=>h.rooms[r].snags.filter(s=>!s.resolved).forEach(s=>hsnags.push({...s,room:r})));
    if(hsnags.length===0)continue;

    ensureSpace(15);
    doc.setFillColor(241,245,249);
    doc.rect(M,y-5,pageW-2*M,9,'F');
    doc.setFontSize(13).setFont(undefined,'bold').setTextColor(15,23,42);
    doc.text(`Unit: ${h.name}`,M+2,y+1);
    doc.setFontSize(10).setFont(undefined,'normal').setTextColor(100);
    doc.text(`${hsnags.length} open snag${hsnags.length!==1?"s":""}`,pageW-M-2,y+1,{align:'right'});
    y+=10;

    for(const s of hsnags){
      const photo=s.photoKey?getP(s.photoKey):null;
      const blockSpace=photo?78:36;
      ensureSpace(blockSpace);

      const startY=y;
      const stype=SNAG_TYPES.find(t=>t.code===s.type);

      doc.setFontSize(10).setFont(undefined,'bold');
      const tc=TC[s.type]||"#646464";
      const hex=tc.replace('#','');const r=parseInt(hex.slice(0,2),16);const g=parseInt(hex.slice(2,4),16);const b=parseInt(hex.slice(4,6),16);
      doc.setTextColor(r,g,b);
      doc.text(`${s.room} • ${stype?.label||s.type}`,M+2,y);
      doc.setTextColor(120,120,120).setFont(undefined,'normal').setFontSize(9);
      doc.text(`Logged: ${new Date(s.loggedAt).toLocaleString('en-IE')}`,pageW-M-2,y,{align:'right'});
      y+=5;

      doc.setFontSize(10).setTextColor(40,40,40);
      const lines=[];
      if(s.material)lines.push(`Material: ${s.material}`);
      const dim=[s.height?`H:${s.height}mm`:"",s.width?`W:${s.width}mm`:""].filter(Boolean).join("  ");
      if(dim)lines.push(`Size: ${dim}`);
      if(s.quantity)lines.push(`Quantity: ${s.quantity} ${s.unit||""}`);
      if(s.correctHouse)lines.push(`Correct house: ${s.correctHouse}`);
      if(s.description){
        const wrapped=doc.splitTextToSize(s.description,pageW-2*M-(photo?75:5));
        wrapped.forEach(w=>lines.push(w));
      }

      const textX=M+2;
      const textMaxW=photo?pageW-2*M-78:pageW-2*M-5;
      lines.forEach(line=>{
        const wrapped=doc.splitTextToSize(line,textMaxW);
        wrapped.forEach(w=>{
          if(y>pageH-M){doc.addPage();y=M;}
          doc.text(w,textX,y);y+=4.5;
        });
      });

      if(photo){
        try{
          const imgW=68,imgH=51;
          doc.addImage(photo,'JPEG',pageW-M-imgW-2,startY+5,imgW,imgH);
          y=Math.max(y,startY+5+imgH+3);
        }catch(e){console.error("PDF image error:",e);}
      }

      doc.setDrawColor(230,230,230);
      doc.line(M,y+1,pageW-M,y+1);
      y+=6;
    }
    y+=3;
  }

  const total=doc.getNumberOfPages();
  for(let i=1;i<=total;i++){
    doc.setPage(i);
    doc.setFontSize(8).setTextColor(150,150,150);
    doc.text(`Page ${i} of ${total}`,pageW/2,pageH-7,{align:'center'});
  }

  doc.save(`Snags_Report_${new Date().toISOString().slice(0,10)}.pdf`);
};

// ── UI Atoms ───────────────────────────────────────────────────────────────────
const PBar=({p,color=T.success,h=6})=>(
  <div style={{background:T.border,borderRadius:99,height:h,overflow:"hidden",width:"100%"}}>
    <div style={{width:`${p}%`,height:"100%",background:color,borderRadius:99,transition:"width .5s"}}/>
  </div>
);

function Btn({children,onClick,v,sm,sx={}}){
  const vs={
    _:{background:T.card,border:`1px solid ${T.borderStrong}`,color:T.text2},
    primary:{background:T.primary,border:"none",color:"#fff"},
    danger:{background:"#fff",border:`1px solid ${T.danger}55`,color:T.danger},
    success:{background:"#fff",border:`1px solid ${T.success}55`,color:T.success},
    ghost:{background:"transparent",border:"none",color:T.text2}
  };
  return <button className="btn" onClick={onClick} style={{...(vs[v]||vs._),padding:sm?"6px 12px":"10px 16px",fontSize:sm?12:14,
    borderRadius:9,cursor:"pointer",fontWeight:600,minHeight:sm?34:44,...sx}}>{children}</button>;
}

const L=({c})=><div style={{fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:.5,marginBottom:6,fontWeight:600}}>{c}</div>;
const II={background:T.cardAlt,border:`1px solid ${T.borderStrong}`,color:T.text,borderRadius:9,
  padding:"10px 12px",fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",minHeight:44,transition:"border .15s, box-shadow .15s"};

// ── Snag Form (add or edit) ────────────────────────────────────────────────────
function SnagForm({initial,onSubmit,onCancel,submitLabel="Log Snag",title="📋 Log New Snag"}){
  const [f,sf]=useState(()=>initial||{type:"SNAG_BSAW",material:MATS[0],height:"",width:"",description:"",correctHouse:"",quantity:"",unit:"sheets",photoDataUrl:null});
  const [photoChanged,setPhotoChanged]=useState(false);
  const ref=useRef();
  const sel=SNAG_TYPES.find(t=>t.code===f.type);
  const set=p=>sf(x=>({...x,...p}));
  const onFile=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{set({photoDataUrl:ev.target.result});setPhotoChanged(true);};r.readAsDataURL(file);e.target.value="";};
  const removePhoto=()=>{set({photoDataUrl:null});setPhotoChanged(true);};

  return(
    <div style={{background:T.cardAlt,border:`1px solid ${T.borderStrong}`,borderRadius:12,padding:16,marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:15,color:T.text,marginBottom:14}}>{title}</div>

      <div style={{marginBottom:12}}><L c="Issue Type"/>
        <select value={f.type} onChange={e=>set({type:e.target.value})} style={{...II,background:"#fff"}}>
          {SNAG_TYPES.map(t=><option key={t.code} value={t.code}>{t.label}</option>)}
        </select>
      </div>

      {sel?.panel&&<>
        <div style={{marginBottom:12}}><L c="Material / Board Type"/>
          <select value={f.material||MATS[0]} onChange={e=>set({material:e.target.value})} style={{...II,background:"#fff"}}>
            {MATS.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><L c="Height (mm)"/><input type="number" inputMode="numeric" placeholder="720" value={f.height||""} onChange={e=>set({height:e.target.value})} style={{...II,background:"#fff"}}/></div>
          <div><L c="Width (mm)"/><input type="number" inputMode="numeric" placeholder="600" value={f.width||""} onChange={e=>set({width:e.target.value})} style={{...II,background:"#fff"}}/></div>
        </div>
      </>}

      {sel?.excess&&<>
        <div style={{marginBottom:12}}><L c="Material"/>
          <select value={f.material||MATS[0]} onChange={e=>set({material:e.target.value})} style={{...II,background:"#fff"}}>
            {MATS.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:12}}>
          <div><L c="Quantity"/><input type="number" inputMode="numeric" placeholder="e.g. 3" value={f.quantity||""} onChange={e=>set({quantity:e.target.value})} style={{...II,background:"#fff"}}/></div>
          <div><L c="Unit"/><select value={f.unit||"sheets"} onChange={e=>set({unit:e.target.value})} style={{...II,background:"#fff"}}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
        </div>
      </>}

      {f.type==="WRONG_HOUSE"&&<div style={{marginBottom:12}}><L c="Correct House / Plot"/>
        <input placeholder="e.g. Plot 4" value={f.correctHouse||""} onChange={e=>set({correctHouse:e.target.value})} style={{...II,background:"#fff"}}/>
      </div>}

      <div style={{marginBottom:12}}><L c="Details / Description"/>
        <textarea placeholder="Describe the issue…" rows={2} value={f.description||""} onChange={e=>set({description:e.target.value})} style={{...II,background:"#fff",resize:"vertical"}}/>
      </div>

      <div style={{marginBottom:16}}><L c="Photo"/>
        {f.photoDataUrl?(
          <div style={{position:"relative",display:"inline-block"}}>
            <img src={f.photoDataUrl} style={{maxWidth:180,maxHeight:130,borderRadius:9,border:`1px solid ${T.borderStrong}`,display:"block"}}/>
            <button onClick={removePhoto} style={{position:"absolute",top:5,right:5,background:"#000c",border:"none",color:"#fff",borderRadius:6,cursor:"pointer",padding:"3px 9px",fontSize:14}}>×</button>
          </div>
        ):(
          <><input ref={ref} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={onFile}/>
          <Btn sm onClick={()=>ref.current?.click()}>📷 Take / Upload Photo</Btn></>
        )}
      </div>

      <div style={{display:"flex",gap:8}}>
        <Btn v="primary" onClick={()=>onSubmit({...f,_photoChanged:photoChanged})}>{submitLabel}</Btn>
        <Btn v="ghost" sm onClick={onCancel}>Cancel</Btn>
      </div>
    </div>
  );
}

// ── Snag Item ──────────────────────────────────────────────────────────────────
function SnagItem({snag,onToggle,onDelete,onEdit}){
  const [photo,setPhoto]=useState(null);
  const [exp,setExp]=useState(false);
  const t=SNAG_TYPES.find(x=>x.code===snag.type);
  const c=TC[snag.type]||T.text3;
  const loadPh=()=>{if(!photo&&snag.photoKey){const p=getP(snag.photoKey);if(p)setPhoto(p);}};

  const summary=snag.description
    ?(snag.description.length>55?snag.description.slice(0,55)+"…":snag.description)
    :snag.material
      ?[snag.material,snag.height&&`H:${snag.height}mm`,snag.width&&`W:${snag.width}mm`,snag.quantity&&`×${snag.quantity} ${snag.unit||""}`].filter(Boolean).join(" ")
      :"—";

  return(
    <div style={{border:`1px solid ${snag.resolved?T.border:c+"55"}`,borderRadius:11,marginBottom:8,overflow:"hidden",background:snag.resolved?T.cardAlt:"#fff"}}>
      <div style={{padding:"11px 12px",display:"flex",alignItems:"center",gap:9,cursor:"pointer",minHeight:54}} onClick={()=>{setExp(e=>!e);if(!exp)loadPh();}}>
        <button onClick={e=>{e.stopPropagation();onToggle();}} style={{
          background:snag.resolved?T.success+"22":T.danger+"22",border:`1px solid ${snag.resolved?T.success+"77":T.danger+"77"}`,
          color:snag.resolved?T.success:T.danger,borderRadius:7,padding:"5px 10px",cursor:"pointer",
          fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:600,whiteSpace:"nowrap",flexShrink:0,minHeight:34
        }}>{snag.resolved?"DONE":"OPEN"}</button>
        <span style={{fontSize:10,fontWeight:700,color:c,fontFamily:"'DM Mono',monospace",flexShrink:0,minWidth:68}}>{(t?.label||"").split(" ").slice(0,2).join(" ")}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,color:snag.resolved?T.text3:T.text,textDecoration:snag.resolved?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>{summary}</div>
          <div style={{fontSize:10,color:T.text3,marginTop:2,fontFamily:"'DM Mono',monospace"}}>{fmtDate(snag.loggedAt)}</div>
        </div>
        {snag.photoKey&&<span style={{flexShrink:0,fontSize:14}}>📷</span>}
        <span style={{color:T.text3,fontSize:11,flexShrink:0}}>{exp?"▲":"▼"}</span>
      </div>
      {exp&&(
        <div style={{padding:"10px 14px 14px",borderTop:`1px solid ${T.border}`,background:T.cardAlt}}>
          {snag.material&&<div style={{fontSize:13,color:T.text2,marginBottom:4}}>Material: <span style={{color:T.text,fontWeight:500}}>{snag.material}</span></div>}
          {(snag.height||snag.width)&&<div style={{fontSize:13,color:T.text2,marginBottom:4}}>
            {snag.height&&<>H: <span style={{color:T.text,fontWeight:500}}>{snag.height}mm  </span></>}
            {snag.width&&<>W: <span style={{color:T.text,fontWeight:500}}>{snag.width}mm</span></>}
          </div>}
          {snag.quantity&&<div style={{fontSize:13,color:"#f97316",marginBottom:4,fontWeight:600}}>Qty: {snag.quantity} {snag.unit||""}</div>}
          {snag.correctHouse&&<div style={{fontSize:13,color:"#ec4899",marginBottom:4,fontWeight:600}}>→ Correct house: {snag.correctHouse}</div>}
          {snag.description&&<div style={{fontSize:14,color:T.text,marginBottom:8,lineHeight:1.55}}>{snag.description}</div>}
          {snag.photoKey&&(
            <div style={{marginTop:8,marginBottom:10}}>
              {photo?(
                <div style={{position:"relative",display:"inline-block"}}>
                  <img src={photo} style={{maxWidth:"100%",maxHeight:280,borderRadius:10,border:`1px solid ${T.borderStrong}`,display:"block"}}/>
                  <div style={{position:"absolute",bottom:7,left:7,background:"#000d",color:"#fff",fontSize:11,padding:"4px 10px",borderRadius:6,fontFamily:"'DM Mono',monospace"}}>📷 {fmtDate(snag.loggedAt)}</div>
                </div>
              ):<Btn sm onClick={loadPh}>Load Photo</Btn>}
            </div>
          )}
          <div style={{display:"flex",gap:8,marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
            <Btn sm v="primary" onClick={onEdit}>✏️ Edit</Btn>
            <Btn sm v="danger" onClick={()=>{if(confirm("Delete this snag?"))onDelete();}}>🗑 Delete</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Room Panel ─────────────────────────────────────────────────────────────────
const Card=({children,extraSx})=><div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(15,23,42,.04)",...extraSx}}>{children}</div>;

function RoomPanel({houseId,room,rd,onUpdate}){
  const [showAdd,setShowAdd]=useState(false);
  const [editing,setEditing]=useState(null); // { snagId, initial }
  const finRef=useRef();
  const [finPh,setFinPh]=useState(()=>rd.finishPhotoKey?getP(rd.finishPhotoKey):null);

  const upd=d=>onUpdate(d);
  const setStage=s=>upd({...rd,installStage:s,lastInspection:new Date().toISOString()});
  const stampNow=()=>upd({...rd,lastInspection:new Date().toISOString()});

  const submitNew=async fd=>{
    let pk=null;
    if(fd.photoDataUrl){pk=`ph:${uid()}`;await saveP(pk,fd.photoDataUrl);}
    const {photoDataUrl,_photoChanged,...rest}=fd;
    upd({...rd,lastInspection:new Date().toISOString(),snags:[...rd.snags,{...rest,id:uid(),loggedAt:new Date().toISOString(),resolved:false,resolvedAt:null,photoKey:pk}]});
    setShowAdd(false);
  };

  const startEdit=snag=>{
    let dataUrl=null;
    if(snag.photoKey)dataUrl=getP(snag.photoKey);
    setEditing({
      snagId:snag.id,
      initial:{
        type:snag.type,
        material:snag.material||MATS[0],
        height:snag.height||"",
        width:snag.width||"",
        description:snag.description||"",
        correctHouse:snag.correctHouse||"",
        quantity:snag.quantity||"",
        unit:snag.unit||"sheets",
        photoDataUrl:dataUrl
      }
    });
    setShowAdd(false);
  };

  const submitEdit=async fd=>{
    const old=rd.snags.find(s=>s.id===editing.snagId);
    if(!old){setEditing(null);return;}
    let pk=old.photoKey;
    if(fd._photoChanged){
      if(old.photoKey)delP(old.photoKey);
      if(fd.photoDataUrl){
        pk=`ph:${uid()}`;
        await saveP(pk,fd.photoDataUrl);
      } else {
        pk=null;
      }
    }
    const {photoDataUrl,_photoChanged,...rest}=fd;
    upd({
      ...rd,
      lastInspection:new Date().toISOString(),
      snags:rd.snags.map(s=>s.id===editing.snagId?{...s,...rest,photoKey:pk,editedAt:new Date().toISOString()}:s)
    });
    setEditing(null);
  };

  const tog=id=>upd({...rd,snags:rd.snags.map(s=>s.id===id?{...s,resolved:!s.resolved,resolvedAt:!s.resolved?new Date().toISOString():null}:s)});
  const del=id=>{const s=rd.snags.find(x=>x.id===id);delP(s?.photoKey);upd({...rd,snags:rd.snags.filter(x=>x.id!==id)});};

  const onFinFile=async e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{const k=`ph:fin:${houseId}:${room}`;const ok=await saveP(k,ev.target.result);
      if(ok){const d=getP(k);setFinPh(d);upd({...rd,finishPhotoKey:k});}
    };r.readAsDataURL(file);e.target.value="";
  };

  const open=rOpen(rd);

  const renderSnag=s=>editing?.snagId===s.id
    ? <SnagForm key={s.id} initial={editing.initial} onSubmit={submitEdit} onCancel={()=>setEditing(null)} submitLabel="Save Changes" title="✏️ Edit Snag"/>
    : <SnagItem key={s.id} snag={s} onToggle={()=>tog(s.id)} onDelete={()=>del(s.id)} onEdit={()=>startEdit(s)}/>;

  return(
    <div>
      <Card>
        <L c="Installation Stage"/>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {STAGES.map(s=>{const a=rd.installStage===s;const c=SC[s];return(
            <button key={s} className="btn" onClick={()=>setStage(s)} style={{
              background:a?c+"15":"#fff",border:`1.5px solid ${a?c:T.border}`,
              color:a?c:T.text2,borderRadius:9,padding:"8px 14px",cursor:"pointer",
              fontSize:13,fontWeight:a?700:500,display:"flex",alignItems:"center",gap:7,minHeight:42
            }}>
              <span style={{width:9,height:9,borderRadius:"50%",background:c,boxShadow:a?`0 0 0 3px ${c}33`:"none",flexShrink:0}}/>
              {s}
            </button>
          );})}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginTop:13,paddingTop:13,borderTop:`1px solid ${T.border}`,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:T.text2,flex:1}}>
            Last inspection:&nbsp;<span style={{color:T.text,fontFamily:"'DM Mono',monospace",fontWeight:500}}>{fmtDate(rd.lastInspection)}</span>
          </span>
          <Btn sm onClick={stampNow}>🕐 Stamp Now</Btn>
        </div>
      </Card>

      {rd.installStage==="Finished"&&(
        <Card extraSx={{borderColor:T.success+"66",background:T.success+"08"}}>
          <L c="✓ Completion Photo"/>
          {finPh?(
            <div style={{position:"relative",display:"inline-block"}}>
              <img src={finPh} style={{maxWidth:"100%",maxHeight:300,borderRadius:10,border:`1px solid ${T.success}77`,display:"block"}}/>
              <div style={{position:"absolute",bottom:8,left:8,background:"#000d",color:"#fff",fontSize:12,padding:"4px 11px",borderRadius:7,fontFamily:"'DM Mono',monospace",fontWeight:500}}>
                ✓ FINISHED · {fmtDate(rd.lastInspection)}
              </div>
              <button onClick={()=>{setFinPh(null);delP(rd.finishPhotoKey);upd({...rd,finishPhotoKey:null});}} style={{position:"absolute",top:7,right:7,background:"#000d",border:"none",color:"#fff",borderRadius:7,cursor:"pointer",padding:"4px 11px",fontSize:13}}>Replace</button>
            </div>
          ):(
            <>
              <div style={{fontSize:13,color:T.text2,marginBottom:10}}>Photograph the finished room to complete sign-off.</div>
              <input ref={finRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={onFinFile}/>
              <Btn v="success" sm onClick={()=>finRef.current?.click()}>📷 Add Completion Photo</Btn>
            </>
          )}
        </Card>
      )}

      <Card extraSx={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"13px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",minHeight:54,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:15,color:T.text}}>Snags & Issues</span>
            {open>0&&<span style={{background:T.danger+"15",color:T.danger,border:`1px solid ${T.danger}66`,borderRadius:99,fontSize:11,padding:"2px 10px",fontWeight:600}}>{open} open</span>}
            {rd.snags.filter(s=>s.resolved).length>0&&<span style={{background:T.success+"15",color:T.success,border:`1px solid ${T.success}66`,borderRadius:99,fontSize:11,padding:"2px 10px",fontWeight:600}}>{rd.snags.filter(s=>s.resolved).length} done</span>}
          </div>
          <Btn sm v={showAdd?"ghost":"primary"} onClick={()=>{setShowAdd(v=>!v);setEditing(null);}}>{showAdd?"✕ Cancel":"+ Log Snag"}</Btn>
        </div>
        <div style={{padding:showAdd||editing||rd.snags.length>0?"12px":"14px 16px"}}>
          {showAdd&&<SnagForm onSubmit={submitNew} onCancel={()=>setShowAdd(false)}/>}
          {rd.snags.length===0&&!showAdd&&<div style={{color:T.text3,fontSize:13,fontStyle:"italic"}}>No snags logged for this room</div>}
          {rd.snags.filter(s=>!s.resolved).map(renderSnag)}
          {rd.snags.filter(s=>s.resolved).length>0&&(
            <details style={{marginTop:4}}>
              <summary style={{fontSize:12,color:T.text2,padding:"7px 0",userSelect:"none",fontWeight:500}}>
                Show resolved ({rd.snags.filter(s=>s.resolved).length}) ▾
              </summary>
              <div style={{marginTop:6}}>
                {rd.snags.filter(s=>s.resolved).map(renderSnag)}
              </div>
            </details>
          )}
        </div>
      </Card>

      <Card>
        <L c="Notes"/>
        <textarea value={rd.notes} onChange={e=>upd({...rd,notes:e.target.value})} placeholder="Add notes for this room…" rows={3}
          style={{...II,background:"#fff",resize:"vertical"}}/>
      </Card>
    </div>
  );
}

        </div>

}

            <input value={nm} onChange={e=>setNm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
              placeholder="Add house / plot number…"
              style={{flex:1,background:T.card,border:`1px solid ${T.borderStrong}`,color:T.text,borderRadius:10,padding:"11px 14px",fontSize:14,outline:"none",minHeight:46}}/>
            <Btn v="primary" onClick={add}>+ Add</Btn>
          </div>
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:"14px 14px 50px"}}>
        <div style={{display:"flex",gap:7,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
          {[["all","All"],["active","Active"],["snags","Has Snags"],["complete","Complete"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} style={{
              background:filter===v?T.card:"transparent",border:`1px solid ${filter===v?T.borderStrong:T.border}`,
              color:filter===v?T.text:T.text2,borderRadius:9,padding:"8px 14px",fontSize:13,cursor:"pointer",minHeight:38,fontWeight:filter===v?600:500
            }}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap"}}>
          <Btn sm onClick={()=>exportStatus(sorted)}>📊 Status Excel</Btn>
          <Btn sm v="danger" onClick={()=>exportSnags(sorted,settings.project)}>⚠ Snags Excel</Btn>
          <Btn sm v="primary" onClick={()=>exportPDF(sorted,settings.project)}>📄 Snags PDF</Btn>
        </div>

        {filtered.length===0?(
          <div style={{textAlign:"center",padding:"70px 0",color:T.text3,fontSize:15}}>
            {houses.length===0?"Tap '+ Add' above to add your first house":"No houses match this filter"}
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
            {filtered.map(h=><HouseCard key={h.id} house={h} onSelect={()=>onSelect(h)} onDelete={()=>onDelete(h.id)}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

// ── App Root ───────────────────────────────────────────────────────────────────
function App(){
  const [houses,setHouses]=useState(()=>loadH());
  const [settings,setSettings]=useState(()=>loadS());
  const [sel,setSel]=useState(null);
  const [showSet,setShowSet]=useState(false);

  useEffect(()=>{LS.set("tk4-h",JSON.stringify(houses));},[houses]);
  useEffect(()=>{LS.set("tk4-s",JSON.stringify(settings));},[settings]);

  const addH=useCallback(name=>setHouses(hs=>[...hs,DH(name)]),[]);
  const delH=useCallback(id=>{setHouses(hs=>hs.filter(h=>h.id!==id));setSel(s=>s?.id===id?null:s);},[]);
  const updH=useCallback(u=>{setHouses(hs=>hs.map(h=>h.id===u.id?u:h));setSel(u);},[]);
  const handleImport=useCallback(file=>importBackup(file,setHouses,setSettings),[]);

  return(
    <>
      {sel
        ?<HouseDetail house={sel} onUpdate={updH} onBack={()=>setSel(null)}/>
        :<Dashboard houses={houses} onSelect={setSel} onAdd={addH} onDelete={delH} settings={settings} onSettings={()=>setShowSet(true)}/>
      }
      {showSet&&<SettingsModal settings={settings} houses={houses}
        onSaveSettings={setSettings}
        onImport={handleImport}
        onClose={()=>setShowSet(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
